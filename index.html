<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MellorCraft | Official Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: white;
            overflow-x: hidden;
        }

        .logo-font {
            font-family: 'Russo One', sans-serif;
        }

        /* 3D Extruded Text Effect for the Logo */
        .text-3d {
            text-shadow: 
                1px 1px 0px #1e293b,
                2px 2px 0px #1e293b,
                3px 3px 0px #1e293b,
                4px 4px 0px #1e293b,
                5px 5px 0px #1e293b,
                6px 6px 0px #0f172a,
                7px 7px 15px rgba(0,0,0,0.8);
        }

        /* Floating Animation for the Logo Icon */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* Slow Pan/Zoom for the background screenshot */
        @keyframes slowZoom {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        .bg-zoom {
            animation: slowZoom 40s ease-in-out infinite;
        }

        /* Glassmorphism utility */
        .glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-hover:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative selection:bg-emerald-500 selection:text-white">

    <!-- Background Layer with Image -->
    <div class="fixed inset-0 z-0 overflow-hidden bg-[#87CEEB]">
        <!-- 
          The background uses the uploaded image.
        -->
        <img src="image_77a7ae.png" alt="MellorCraft Game Background" class="absolute inset-0 w-full h-full object-cover bg-zoom" onerror="this.src='https://placehold.co/1920x1080/87CEEB/ffffff?text=Image+Not+Found'">
        
        <!-- Radial Vignette Overlay to make text readable -->
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-transparent via-slate-900/40 to-slate-900/80"></div>
    </div>

    <!-- Top Navigation Bar -->
    <header class="relative z-20 w-full glass border-b-0 border-white/5 py-4 px-6 md:px-12 flex items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer">
            <!-- Mini Logo Icon -->
            <svg width="32" height="32" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <g transform="translate(60, 60)">
                    <path d="M 0 -40 L 35 -20 L 0 0 L -35 -20 Z" fill="#4ade80" stroke="#22c55e" stroke-width="4" stroke-linejoin="round"/>
                    <path d="M -35 -20 L 0 0 L 0 40 L -35 20 Z" fill="#8B5A2B" stroke="#6b4423" stroke-width="4" stroke-linejoin="round"/>
                    <path d="M 0 0 L 35 -20 L 35 20 L 0 40 Z" fill="#6b4423" stroke="#4a2f18" stroke-width="4" stroke-linejoin="round"/>
                </g>
            </svg>
            <span class="logo-font text-xl tracking-wider text-white">MELLORCRAFT</span>
        </div>
        <nav class="hidden md:flex items-center gap-8 text-sm font-semibold tracking-wide text-gray-300">
            <a href="#" class="hover:text-white transition-colors">HOME</a>
            <a href="https://docs.google.com/document/d/145Bj5VhRbVf4PrRkyiXxpvTqG7uDzjGFCV9t9w1fA8c/edit?" target="_blank" class="hover:text-white transition-colors">EARLIER VERSIONS</a>
            <a href="https://sites.google.com/view/mellorsmusic/mellorcraft-soundtrack" target="_blank" class="hover:text-white transition-colors">SOUNDTRACK</a>
        </nav>
        <button class="md:hidden text-white">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </header>

    <!-- Main Hero Content -->
    <main class="relative z-10 flex-grow flex flex-col items-center justify-center px-4 py-20 text-center">
        
        <!-- Large Floating Logo Icon -->
        <div class="animate-float mb-6 relative">
            <div class="absolute inset-0 bg-emerald-500 blur-3xl opacity-20 rounded-full scale-150"></div>
            <svg width="140" height="140" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" class="relative z-10 drop-shadow-2xl">
                <g transform="translate(60, 60)">
                    <!-- Top Face (Grass) -->
                    <path d="M 0 -40 L 35 -20 L 0 0 L -35 -20 Z" fill="#4ade80" stroke="#22c55e" stroke-width="3" stroke-linejoin="round"/>
                    <!-- Left Face (Dirt) -->
                    <path d="M -35 -20 L 0 0 L 0 40 L -35 20 Z" fill="#8B5A2B" stroke="#6b4423" stroke-width="3" stroke-linejoin="round"/>
                    <!-- Right Face (Dirt shadow) -->
                    <path d="M 0 0 L 35 -20 L 35 20 L 0 40 Z" fill="#6b4423" stroke="#4a2f18" stroke-width="3" stroke-linejoin="round"/>
                    <!-- Highlight accents -->
                    <path d="M 0 -20 L 17.5 -10" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
                    <path d="M -17.5 -10 L 0 0" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
                    <path d="M 0 0 L 0 20" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round"/>
                </g>
            </svg>
        </div>

        <!-- Official Text Logo -->
        <h1 class="logo-font text-5xl sm:text-7xl md:text-8xl lg:text-9xl text-white tracking-widest text-3d mb-6 relative z-10">
            MELLORCRAFT
        </h1>

        <!-- Subheading -->
        <p class="text-lg sm:text-xl md:text-2xl text-gray-300 font-light tracking-wide max-w-2xl mb-12 drop-shadow-lg relative z-10">
            A limitless voxel universe awaits. Explore vast landscapes, gather resources, and build your wildest imagination.
        </p>

        <!-- Call to Action Buttons -->
        <div class="flex flex-col sm:flex-row flex-wrap gap-5 w-full max-w-sm sm:max-w-4xl justify-center relative z-10">
            
            <!-- Link to the Web Game -->
            <a href="mellorcraft.html" class="btn-hover group relative px-8 py-4 bg-emerald-600 hover:bg-emerald-500 border border-emerald-400/50 rounded-xl overflow-hidden flex items-center justify-center gap-3">
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
                <svg class="w-6 h-6 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="relative z-10 font-bold text-lg tracking-wider">PLAY NOW</span>
            </a>

            <!-- Link to the Mobile Game -->
            <a href="mellorcraftmobile.html" class="btn-hover group relative px-8 py-4 bg-indigo-600 hover:bg-indigo-500 border border-indigo-400/50 rounded-xl overflow-hidden flex items-center justify-center gap-3">
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
                <svg class="w-6 h-6 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <span class="relative z-10 font-bold text-lg tracking-wider">MOBILE VERSION</span>
            </a>

        </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-20 w-full py-6 text-center border-t border-white/5 glass mt-auto">
        <p class="text-gray-400 text-sm font-medium tracking-wide">
            &copy; 2026 MellorCraft. All rights reserved.
        </p>
    </footer>

</body>
</html>
